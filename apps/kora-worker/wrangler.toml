compatibility_date = "2026-06-01"

[[kv_namespaces]]
binding = "LIMITS"
id = "REPLACE_AFTER_wrangler_kv_namespace_create_LIMITS"

[vars]
ALLOWED_ORIGINS = "https://evgenijtebevezet-art.github.io"
DAILY_BUDGET = "200"
NIM_MODEL = "qwen/qwen3.5-397b-instruct"
GROQ_MODEL = "llama-3.3-70b-versatile"
# секреты (не сюда!): npx wrangler secret put NIM_API_KEY / GROQ_API_KEY / CLIENT_KEY
